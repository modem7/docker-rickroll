name: Publish to GHCR

on:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - scripts/**
  # Video content can change (a re-transcode uploaded to the same asset
  # URLs) without touching git at all, so there's nothing here for the
  # push trigger above to detect - chain off video-assets.yml finishing
  # instead, since that's the thing that actually produces new content.
  workflow_run:
    workflows: ["Rebuild video release assets"]
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # workflow_run fires regardless of whether the triggering workflow
    # actually succeeded - skip publishing a build off a failed/partial
    # transcode. Push and manual triggers aren't affected by this check.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - resolution: 480p
            video_url: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-480p.mp4
            tags: ghcr.io/${{ github.repository }}:480p
          - resolution: 720p
            video_url: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-720p.mp4
            tags: ghcr.io/${{ github.repository }}:720p
          - resolution: 1080p
            video_url: ""
            tags: |
              ghcr.io/${{ github.repository }}:latest
              ghcr.io/${{ github.repository }}:1080p
          - resolution: 2160p
            video_url: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-2160p.mp4
            tags: ghcr.io/${{ github.repository }}:2160p
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.resolution }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64/v8
          build-args: |
            ${{ matrix.video_url != '' && format('VIDEO_URL={0}', matrix.video_url) || '' }}
          tags: ${{ matrix.tags }}
          # Scoped per resolution so the four matrix legs (different
          # VIDEO_URL/content each) don't stomp on each other's cache.
          # mode=max also caches the video-fetch stage, not just the
          # final image, so re-runs skip re-downloading the video
          # asset entirely when VIDEO_URL hasn't changed.
          cache-from: type=gha,scope=${{ matrix.resolution }}
          cache-to: type=gha,mode=max,scope=${{ matrix.resolution }}
