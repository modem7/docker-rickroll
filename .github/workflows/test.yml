name: Test image

on:
  push:
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/test.yml
      - .github/scripts/test-autoplay.js
      - .github/scripts/test-mobile-fit.js
  pull_request:
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/test.yml
      - .github/scripts/test-autoplay.js
      - .github/scripts/test-mobile-fit.js
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: rickroll:test
          # Same video-fetch stage as ghcr-publish.yml, and this
          # workflow always builds the same default VIDEO_URL - caching
          # it means CI stops re-downloading the video on every run.
          cache-from: type=gha,scope=test
          cache-to: type=gha,mode=max,scope=test

      - name: Start container with default env vars
        run: docker run -d --name rickroll-default -p 8080:8080 rickroll:test

      - name: Wait for default container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec rickroll-default curl -fsS http://localhost:9090/healthz && exit 0
            sleep 1
          done
          docker logs rickroll-default
          exit 1

      - name: Check index page structure
        run: |
          set -eu
          html=$(curl -fsS http://localhost:8080/)
          echo "$html" | grep -q '<title>Loading...</title>'
          echo "$html" | grep -qE '<video id="video"[^>]*\bautoplay\b'
          echo "$html" | grep -qE '<video id="video"[^>]*\bmuted\b'
          echo "$html" | grep -q 'source src="video.mp4"'
          echo "$html" | grep -q 'id="cookie-banner"'
          echo "$html" | grep -q 'id="site-error"'
          echo "$html" | grep -q 'id="loading-screen"'

      - name: Check video file is actually served
        run: |
          headers=$(curl -sS -o /dev/null -D - http://localhost:8080/video.mp4)
          echo "$headers" | grep -qE '^HTTP/[0-9.]+ 200'
          echo "$headers" | grep -qi '^content-type: *video/mp4'

      - name: Check an arbitrary path also serves the page (any URL rickrolls you)
        run: |
          set -eu
          status=$(curl -sS -o /dev/null -w '%{http_code}' http://localhost:8080/some/random/path)
          [ "$status" = "404" ]
          html=$(curl -sS http://localhost:8080/some/random/path)
          echo "$html" | grep -q 'id="video"'

      - name: Check container runs as non-root
        run: |
          docker exec rickroll-default whoami | grep -qv root
          docker exec rickroll-default id | grep -q 'uid=101'

      - name: Check no sudo access
        run: docker exec rickroll-default which sudo && exit 1 || true

      - name: Check no world-writable files
        run: |
          count=$(docker exec rickroll-default find /usr/share/nginx/html -type f -perm /o+w | wc -l)
          [ "$count" -eq 0 ]

      - name: Stop default container
        run: docker rm -f rickroll-default

      - name: Start container with custom PORT
        run: docker run -d --name rickroll-port -p 9000:9000 -e PORT=9000 rickroll:test

      - name: Wait for custom PORT container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec rickroll-port curl -fsS http://localhost:9090/healthz && exit 0
            sleep 1
          done
          docker logs rickroll-port
          exit 1

      - name: Check custom PORT is honored
        run: |
          status=$(curl -fsSL -o /dev/null -w '%{http_code}' http://localhost:9000/)
          [ "$status" = "200" ]

      - name: Stop custom PORT container
        run: docker rm -f rickroll-port

      - name: Start container with custom env vars
        run: |
          docker run -d --name rickroll-custom -p 8080:8080 \
            -e TITLE="Custom Title" \
            -e PRE_TITLE="Custom Loading" \
            -e HEADLINE="Never Gonna Give You Up" \
            -e HEIGHT=50vh \
            -e WIDTH=50% \
            -e OBJECT_FIT=contain \
            -e LOOP=false \
            -e VIDEO_FILE=custom.mp4 \
            -e OVERLAY=error,loading \
            rickroll:test

      - name: Wait for custom container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec rickroll-custom curl -fsS http://localhost:9090/healthz && exit 0
            sleep 1
          done
          docker logs rickroll-custom
          exit 1

      - name: Check custom env vars took effect
        run: |
          set -eu
          html=$(curl -fsS http://localhost:8080/)
          echo "$html" | grep -q '<title>Custom Loading</title>'
          echo "$html" | grep -q 'var title = "Custom Title";'
          echo "$html" | grep -q 'id="headline" class="hidden">Never Gonna Give You Up<'
          echo "$html" | grep -q 'height: 50vh'
          echo "$html" | grep -q 'width: 50%'
          echo "$html" | grep -q 'object-fit: contain'
          echo "$html" | grep -q 'source src="custom.mp4"'
          if echo "$html" | grep -qE '<video id="video"[^>]*\bloop\b'; then
            echo "unexpected loop attribute present with LOOP=false"
            exit 1
          fi
          echo "$html" | grep -q '"error,loading".split'

      - name: Stop custom container
        run: docker rm -f rickroll-custom

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Playwright package
        run: |
          npm init -y >/dev/null
          # Pinned exact version, not a floating "playwright@1" - the
          # cache key below is keyed on this version, and an unpinned
          # install could silently resolve a newer release whose browser
          # binaries no longer match a stale cache.
          npm install --no-save playwright@1.61.1

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-1.61.1

      - name: Install Playwright OS dependencies
        run: npx playwright install-deps chromium firefox

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # Firefox gets its own engine check alongside Chromium - it's
        # historically the most divergent on autoplay/gesture policy
        # enforcement of the mainstream browsers, so a bug that's fine
        # under one can still be broken under the other.
        run: npx playwright install chromium firefox

      - name: Start container with OVERLAY=error
        run: docker run -d --name rickroll-error -p 8080:8080 -e OVERLAY=error rickroll:test

      - name: Wait for OVERLAY=error container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec rickroll-error curl -fsS http://localhost:9090/healthz && exit 0
            sleep 1
          done
          docker logs rickroll-error
          exit 1

      - name: Verify site-error + cookie banner autoplay muted and unmute on click (Chromium)
        run: node .github/scripts/test-autoplay.js error chromium

      - name: Verify site-error + cookie banner autoplay muted and unmute on click (Firefox)
        run: node .github/scripts/test-autoplay.js error firefox

      - name: Stop OVERLAY=error container
        if: always()
        run: docker rm -f rickroll-error || true

      - name: Start container with OVERLAY=loading
        run: docker run -d --name rickroll-loading -p 8080:8080 -e OVERLAY=loading rickroll:test

      - name: Wait for OVERLAY=loading container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec rickroll-loading curl -fsS http://localhost:9090/healthz && exit 0
            sleep 1
          done
          docker logs rickroll-loading
          exit 1

      - name: Verify loading-screen + cookie banner autoplay muted and unmute on click (Chromium)
        run: node .github/scripts/test-autoplay.js loading chromium

      - name: Verify loading-screen + cookie banner autoplay muted and unmute on click (Firefox)
        run: node .github/scripts/test-autoplay.js loading firefox

      - name: Stop OVERLAY=loading container
        if: always()
        run: docker rm -f rickroll-loading || true

      - name: Start container for mobile video-fit test
        run: docker run -d --name rickroll-mobile -p 8080:8080 rickroll:test

      - name: Wait for mobile-fit container to be healthy
        run: |
          for i in $(seq 1 30); do
            docker exec rickroll-mobile curl -fsS http://localhost:9090/healthz && exit 0
            sleep 1
          done
          docker logs rickroll-mobile
          exit 1

      - name: Verify video uses contain on narrow viewports, cover on wide ones
        run: node .github/scripts/test-mobile-fit.js

      - name: Stop mobile-fit container
        if: always()
        run: docker rm -f rickroll-mobile || true
