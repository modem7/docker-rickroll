name: Rebuild video release assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag holding the master video"
        required: true
        default: video-assets-v1
      source_asset:
        description: "Filename of the master asset to transcode from"
        required: true
        default: video4k.mkv

permissions:
  contents: write

jobs:
  transcode:
    runs-on: ubuntu-latest
    steps:
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download master asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "${{ inputs.source_asset }}" \
            --output source.input

      - name: Transcode resolutions
        run: |
          set -eu
          for res in 2160 1080 720 480; do
            ffmpeg -y -i source.input -vf "scale=-2:${res}" \
              -c:v libx264 -preset medium -crf 18 \
              -c:a aac -b:a 192k \
              -movflags +faststart \
              "video-${res}p.mp4"
          done

      - name: Verify output resolutions
        run: |
          set -eu
          for res in 2160 1080 720 480; do
            height=$(ffprobe -v error -select_streams v:0 \
              -show_entries stream=height -of csv=p=0 "video-${res}p.mp4")
            echo "video-${res}p.mp4 -> height=${height}"
            [ "$height" = "$res" ] || { echo "::error::expected height $res, got $height"; exit 1; }
          done

      - name: Upload transcoded assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            video-2160p.mp4 video-1080p.mp4 video-720p.mp4 video-480p.mp4 \
            --repo "${{ github.repository }}" --clobber
