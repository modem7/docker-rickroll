# Waits for every permutation of the build matrix (all four resolutions).
# Runs even if one of them failed (status: failure below) so Slack still
# gets notified either way, but pushrm only pushes the README if
# everything actually succeeded.
depends_on:
  - build

# No path filter here on purpose - this workflow doesn't build anything
# itself, it only runs after the build workflow above (which does have
# the filter), so it's already implicitly gated by whether that ran for
# this particular push.
when:
  - event: [push, manual]
    branch: [master, test/woodpecker-migration]
    status: [success, failure]

steps:
  - name: pushrm-dockerhub
    image: chko/docker-pushrm
    environment:
      DOCKER_USER:
        from_secret: docker_username
      DOCKER_PASS:
        from_secret: docker_password
      PUSHRM_FILE: README.md
      PUSHRM_SHORT: Dockerised Rick Roll
      PUSHRM_TARGET: ${CI_REPO}
    when:
      - status: [success]

  - name: notify-slack
    image: plugins/slack
    settings:
      webhook:
        from_secret: slack_hook
    when:
      - status: [success, failure]
