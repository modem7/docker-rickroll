---

kind: pipeline
type: docker
name: finalize

platform:
  os: linux
  arch: amd64

# Waits for all four resolution pipelines. Runs even if one of them
# failed (status: failure below) so Slack still gets notified either way,
# but pushrm only pushes the README if everything actually succeeded.
depends_on:
  - build-480p
  - build-720p
  - build-1080p-latest
  - build-2160p

steps:
- name: pushrm-dockerhub
  image: chko/docker-pushrm
  environment:
    DOCKER_USER:
      from_secret: docker_username
    DOCKER_PASS:
      from_secret: docker_password
    PUSHRM_FILE: README.md
    PUSHRM_SHORT: Dockerised Rick Roll
    PUSHRM_TARGET: ${DRONE_REPO}
  when:
    status:
      - success

- name: slack
  image: themaz/drone-slack
  settings:
    webhook:
      from_secret: slack_hook
  when:
    status: [ success, failure ]
  depends_on:
    - pushrm-dockerhub

# No paths filter here on purpose - this pipeline doesn't build anything
# itself, it only runs after the four build-* pipelines above (which do
# have the filter), so it's already implicitly gated by whether those
# ran for this particular push.
trigger:
  branch:
    - master
  event:
    - push
    - custom
  status:
    - success
    - failure
