---

kind: pipeline
type: docker
name: docker-rickroll

platform:
  os: linux
  arch: amd64

steps:
- name: Lint Dockerfile
  image: hadolint/hadolint:latest-alpine
  pull: if-not-exists
  commands:
    - hadolint --version
    - hadolint Dockerfile*

# Each tag is a separate resolution built from the same Dockerfile, just
# pointed at a different pre-transcoded video asset (see
# .github/workflows/video-assets.yml). Actual functional testing (env
# vars, autoplay/unmute behavior, container security posture) happens in
# .github/workflows/test.yml, not here - the build itself is the only
# gate before pushing. They all depend only on Lint Dockerfile, so Drone
# runs them as a parallel matrix rather than one-after-another.
- name: Build and Push 480p
  image: thegeeklab/drone-docker-buildx
  privileged: true
  settings:
    repo: ${DRONE_REPO}
    purge: true
    compress: true
    use_cache: true
    build_args:
      - BUILDKIT_INLINE_CACHE=1
      - VIDEO_URL=https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-480p.mp4
    cache_from: "${DRONE_REPO}:480p"
    platforms:
      - linux/amd64
      - linux/arm64/v8
    username:
      from_secret: docker_username
    password:
      from_secret: docker_password
    tags:
      - 480p
  depends_on:
    - Lint Dockerfile

- name: Build and Push 720p
  image: thegeeklab/drone-docker-buildx
  privileged: true
  settings:
    repo: ${DRONE_REPO}
    purge: true
    compress: true
    use_cache: true
    build_args:
      - BUILDKIT_INLINE_CACHE=1
      - VIDEO_URL=https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-720p.mp4
    cache_from: "${DRONE_REPO}:720p"
    platforms:
      - linux/amd64
      - linux/arm64/v8
    username:
      from_secret: docker_username
    password:
      from_secret: docker_password
    tags:
      - 720p
  depends_on:
    - Lint Dockerfile

- name: Build and Push 1080p (latest)
  image: thegeeklab/drone-docker-buildx
  privileged: true
  settings:
    repo: ${DRONE_REPO}
    purge: true
    compress: true
    use_cache: true
    build_args:
      - BUILDKIT_INLINE_CACHE=1
    cache_from: "${DRONE_REPO}:latest"
    platforms:
      - linux/amd64
      - linux/arm64/v8
    username:
      from_secret: docker_username
    password:
      from_secret: docker_password
    tags:
      - latest
      - 1080p
  depends_on:
    - Lint Dockerfile

- name: Build and Push 2160p
  image: thegeeklab/drone-docker-buildx
  privileged: true
  settings:
    repo: ${DRONE_REPO}
    purge: true
    compress: true
    use_cache: true
    build_args:
      - BUILDKIT_INLINE_CACHE=1
      - VIDEO_URL=https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-2160p.mp4
    cache_from: "${DRONE_REPO}:2160p"
    platforms:
      - linux/amd64
      - linux/arm64/v8
    username:
      from_secret: docker_username
    password:
      from_secret: docker_password
    tags:
      - 2160p
  depends_on:
    - Lint Dockerfile

- name: pushrm-dockerhub
  image: chko/docker-pushrm
  environment:
    DOCKER_USER:
      from_secret: docker_username
    DOCKER_PASS:
      from_secret: docker_password
    PUSHRM_FILE: README.md
    PUSHRM_SHORT: Dockerised Rick Roll
    PUSHRM_TARGET: ${DRONE_REPO}
  when:
    status:
      - success
  depends_on:
    - Build and Push 480p
    - Build and Push 720p
    - Build and Push 1080p (latest)
    - Build and Push 2160p

- name: slack
  image: themaz/drone-slack
  settings:
    webhook:
      from_secret: slack_hook
  when:
    status: [ success, failure ]
  depends_on:
    - pushrm-dockerhub

volumes:
- name: docker
  host:
    path: /var/run/docker.sock

trigger:
  event:
    - custom
