# Bumped by video-assets.yml after a successful re-transcode, purely to
# produce a real commit on this path - the video content itself can
# change (re-uploaded to the same asset URLs) without any other diff
# here for the path filter below to detect otherwise.
# Last video refresh: never

# TEMPORARY test scoping while validating on test/woodpecker-migration:
# branch includes the test branch, and tags are suffixed -test so
# nothing here touches the real Docker Hub tags. Revert both before
# merging to master.
when:
  - event: [push, manual]
    branch: [master, test/woodpecker-migration]
    path:
      include:
        - Dockerfile
        - scripts/**
        - .woodpecker.yml

# All four resolutions are steps in one workflow (not a matrix) so that
# pushrm/slack below can reliably see whether any of them failed.
# Matrix permutations are independent workflow runs with no shared
# status - see https://github.com/woodpecker-ci/woodpecker/issues/4337.
# Each build step is built from the same Dockerfile but pointed at a
# different pre-transcoded video asset (see
# .github/workflows/video-assets.yml). Actual functional testing (env
# vars, autoplay/unmute behavior, container security posture) happens in
# .github/workflows/test.yml, not here - lint + build is the only gate
# before pushing.
steps:
  - name: lint-dockerfile
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint --version
      - hadolint Dockerfile*

  - name: build-and-push-480p
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    settings:
      repo: ${CI_REPO}
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
        VIDEO_URL: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-480p.mp4
      cache_from:
        - type=registry\,ref=${CI_REPO}:480p-test
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: 480p-test

  - name: build-and-push-720p
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    settings:
      repo: ${CI_REPO}
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
        VIDEO_URL: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-720p.mp4
      cache_from:
        - type=registry\,ref=${CI_REPO}:720p-test
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: 720p-test

  - name: build-and-push-1080p
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    settings:
      repo: ${CI_REPO}
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
        VIDEO_URL: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-1080p.mp4
      cache_from:
        - type=registry\,ref=${CI_REPO}:1080p-test
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: 1080p-test

  - name: build-and-push-2160p
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    settings:
      repo: ${CI_REPO}
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
        VIDEO_URL: https://github.com/modem7/docker-rickroll/releases/download/video-assets-v1/video-2160p.mp4
      cache_from:
        - type=registry\,ref=${CI_REPO}:2160p-test
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: 2160p-test

  - name: pushrm-dockerhub
    image: chko/docker-pushrm
    depends_on:
      - build-and-push-480p
      - build-and-push-720p
      - build-and-push-1080p
      - build-and-push-2160p
    environment:
      DOCKER_USER:
        from_secret: docker_username
      DOCKER_PASS:
        from_secret: docker_password
      PUSHRM_FILE: README.md
      PUSHRM_SHORT: Dockerised Rick Roll
      PUSHRM_TARGET: ${CI_REPO}
    when:
      - status: [success]

  # CI_PIPELINE_STATUS isn't actually exposed as a container env var on
  # this Woodpecker version, even though the when.status filter that
  # reads it server-side works correctly (proven by the failure case
  # firing at all) - see woodpecker-ci/woodpecker#4337. Rather than
  # depend on that value inside the shell, split into two hardcoded
  # steps and let the filter alone decide which one runs.
  # Reproduces the themaz/drone-slack default attachment layout (Status/
  # Branch/Output/Build Number/Commit/Author/Commit Message). Built with
  # jq rather than raw string interpolation because CI_COMMIT_MESSAGE is
  # attacker-controlled (anyone who can push a commit sets it) and naive
  # interpolation into a JSON string breaks - or worse - on quotes.
  - name: notify-slack-success
    image: alpine:3
    depends_on:
      - build-and-push-480p
      - build-and-push-720p
      - build-and-push-1080p
      - build-and-push-2160p
    environment:
      SLACK_WEBHOOK:
        from_secret: slack_hook
    commands:
      - apk add --no-cache curl jq >/dev/null
      - COMMIT_SHORT=$(echo "$CI_COMMIT_SHA" | cut -c1-10)
      - >
        PAYLOAD=$(jq -n
        --arg status "success"
        --arg branch "$CI_COMMIT_BRANCH"
        --arg output "${CI_REPO}#${CI_PIPELINE_NUMBER}"
        --arg output_url "$CI_PIPELINE_URL"
        --arg build "$CI_PIPELINE_NUMBER"
        --arg commit "$COMMIT_SHORT"
        --arg commit_url "$CI_PIPELINE_FORGE_URL"
        --arg author "$CI_COMMIT_AUTHOR"
        --arg message "$CI_COMMIT_MESSAGE"
        '{attachments:[{color:"good",fields:[
        {title:"Status",value:$status,short:true},
        {title:"Branch",value:$branch,short:true},
        {title:"Output",value:("<"+$output_url+"|"+$output+">"),short:true},
        {title:"Build Number",value:$build,short:true},
        {title:"Commit",value:("<"+$commit_url+"|"+$commit+">"),short:true},
        {title:"Author",value:$author,short:true},
        {title:"Commit Message",value:$message,short:false}
        ]}]}')
      - curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"
    when:
      - status: [success]

  - name: notify-slack-failure
    image: alpine:3
    depends_on:
      - build-and-push-480p
      - build-and-push-720p
      - build-and-push-1080p
      - build-and-push-2160p
    environment:
      SLACK_WEBHOOK:
        from_secret: slack_hook
    commands:
      - apk add --no-cache curl jq >/dev/null
      - COMMIT_SHORT=$(echo "$CI_COMMIT_SHA" | cut -c1-10)
      - >
        PAYLOAD=$(jq -n
        --arg status "failure"
        --arg branch "$CI_COMMIT_BRANCH"
        --arg output "${CI_REPO}#${CI_PIPELINE_NUMBER}"
        --arg output_url "$CI_PIPELINE_URL"
        --arg build "$CI_PIPELINE_NUMBER"
        --arg commit "$COMMIT_SHORT"
        --arg commit_url "$CI_PIPELINE_FORGE_URL"
        --arg author "$CI_COMMIT_AUTHOR"
        --arg message "$CI_COMMIT_MESSAGE"
        '{attachments:[{color:"danger",fields:[
        {title:"Status",value:$status,short:true},
        {title:"Branch",value:$branch,short:true},
        {title:"Output",value:("<"+$output_url+"|"+$output+">"),short:true},
        {title:"Build Number",value:$build,short:true},
        {title:"Commit",value:("<"+$commit_url+"|"+$commit+">"),short:true},
        {title:"Author",value:$author,short:true},
        {title:"Commit Message",value:$message,short:false}
        ]}]}')
      - curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"
    when:
      - status: [failure]
